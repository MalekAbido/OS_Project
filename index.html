<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CLI Pipeline Test</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 50px;">

    <h2>Testing the C++ to HTML Pipeline</h2>
    <div style="width: 400px;">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        // Fetch the JSON file generated by C++
        fetch('chart_data.json')
            .then(response => response.json())
            .then(jsonData => {
                const ctx = document.getElementById('myChart');
                
                // Draw the Pie Chart
                new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: jsonData.labels,
                        datasets: [{
                            label: jsonData.title,
                            data: jsonData.data,
                            backgroundColor: ['#ff6384', '#36a2eb', '#cc65fe']
                        }]
                    }
                });
            })
            .catch(error => console.error('Error loading JSON:', error));
    </script>
</body>
</html>
